<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>College Assistant</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#075E54,#128C7E 50%,#25D366);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero{
  text-align:center;
  color:#fff;
  max-width:480px;
}
.hero h1{
  font-size:1.9rem;
  margin-bottom:8px;
}
.hero p{
  font-size:.95rem;
  opacity:.85;
  margin-bottom:20px;
}
#launcher{
  position:fixed;
  bottom:24px;
  right:24px;
  width:58px;
  height:58px;
  background:#075E54;
  border-radius:50%;
  border:none;
  font-size:24px;
  cursor:pointer;
  box-shadow:0 4px 18px rgba(0,0,0,.3);
}
#widget{
  position:fixed;
  bottom:94px;
  right:24px;
  width:340px;
  height:500px;
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 8px 30px rgba(0,0,0,.3);
  display:none;
  flex-direction:column;
}
#widget.open{
  display:flex;
}
.hdr{
  background:#075E54;
  color:#fff;
  padding:12px 14px;
  display:flex;
  align-items:center;
  gap:10px;
}
.avatar{
  width:38px;
  height:38px;
  border-radius:50%;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.2rem;
  flex-shrink:0;
}
.hdr-name{
  font-weight:600;
  font-size:.95rem;
}
.hdr-sub{
  font-size:.72rem;
  opacity:.85;
  display:flex;
  align-items:center;
  gap:4px;
}
.online-dot{
  width:6px;
  height:6px;
  background:#4ADE80;
  border-radius:50%;
  display:inline-block;
  margin-left:4px;
}
.msgs{
  flex:1;
  overflow-y:auto;
  background:#ECE5DD;
}
.day-label{
  text-align:center;
  font-size:.7rem;
  color:#888;
  margin:10px 0;
}
.row{
  display:flex;
  margin:6px 8px;
}
.row.user{
  justify-content:flex-end;
}
.bbl{
  max-width:75%;
  padding:8px 12px;
  border-radius:10px;
  font-size:.9rem;
  background:#fff;
}
.row.user .bbl{
  background:#DCF8C6;
}
.row.bot{
  justify-content:flex-start;
}
.row.bot .bbl{
  background:#fff;
}
.time{
  font-size:.65rem;
  color:#999;
  text-align:right;
  margin-top:4px;
}
.chips{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  padding:8px;
  background:#fff;
  border-top:1px solid #eee;
}
.chip{
  background:#fff;
  border:1px solid #075E54;
  color:#075E54;
  padding:5px 10px;
  border-radius:16px;
  font-size:.75rem;
  cursor:pointer;
}
.chip:hover{
  background:#075E54;
  color:#fff;
}
.bar{
  display:flex;
  padding:8px;
  gap:6px;
  background:#f0f0f0;
}
#inp{
  flex:1;
  padding:8px;
  border-radius:20px;
  border:1px solid #ccc;
  outline:none;
}
#snd{
  background:#075E54;
  color:#fff;
  border:none;
  width:38px;
  height:38px;
  border-radius:50%;
  cursor:pointer;
  font-size:1rem;
  flex-shrink:0;
}
</style>
</head>
<body>

<div class="hero">
  <div style="font-size:3rem;margin-bottom:10px">🎓</div>
  <h1>Nehru Arts &amp; Science College</h1>
  <p>AI-powered campus assistant &mdash; ask about admissions, courses, fees, placements &amp; more.</p>
</div>

<button id="launcher" onclick="toggleChat()">
   💬
</button>

<div id="widget">

  <div class="hdr">
    <div class="avatar">🎓</div>
    <div class="hdr-text">
      <div class="hdr-name">College Assistant</div>
      <div class="hdr-sub">Nehru Arts &amp; Science College &middot; <span class="online-dot"></span>Online</div>
    </div>
  </div>

  <div class="msgs" id="msgs">
    <div class="day-label">Today</div>
    <div class="row bot">
      <div class="bbl">
        Hi  👋How can I assist you with college information today?
        <div class="time">03:18 pm</div>
      </div>
    </div>
  </div>

  <div class="chips">
    <button class="chip" onclick="askChip('Courses')">🎓 Courses</button>
    <button class="chip" onclick="askChip('Admission')"> 📝 Admission</button>
    <button class="chip" onclick="askChip('Fees')"> 💰 Fees</button>
    <button class="chip" onclick="askChip('Placements')"> 💼 Placements</button>
    <button class="chip" onclick="askChip('Hostel')">  🏠
 Hostel</button>
  </div>

  <div class="bar">
    <input id="inp" type="text" placeholder="Ask about admission, fees, courses..."/>
    <button id="snd" onclick="sendMsg()">  ➤
</button>
  </div>

</div>

<script>
function toggleChat(){
  const widget = document.getElementById('widget');
  widget.classList.toggle('open');
}

function askChip(topic){
  document.getElementById('inp').value = topic;
  sendMsg();
}

async function sendMsg(){
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if(text === '') return;

  const msgs = document.getElementById('msgs');

  const row = document.createElement('div');
  row.className = 'row user';
  row.innerHTML = '<div class="bbl">' + text + '</div>';
  msgs.appendChild(row);

  inp.value = '';

  const typingRow = document.createElement('div');
  typingRow.className = 'row bot';
  typingRow.id = 'typing';
  typingRow.innerHTML = '<div class="bbl">Typing...</div>';
  msgs.appendChild(typingRow);
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const response = await fetch('https://college-chatbot-backend-o6eg.onrender.com/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: text })
    });

    const data = await response.json();

    document.getElementById('typing').remove();

    const botRow = document.createElement('div');
    botRow.className = 'row bot';
    botRow.innerHTML = '<div class="bbl">' + data.answer + '</div>';
    msgs.appendChild(botRow);

  } catch (error) {
    document.getElementById('typing').remove();

    const errRow = document.createElement('div');
    errRow.className = 'row bot';
    errRow.innerHTML = '<div class="bbl">Sorry, I can\'t connect right now. Please try again.</div>';
    msgs.appendChild(errRow);
  }

  msgs.scrollTop = msgs.scrollHeight;
}
</script>

</body>
</html>
